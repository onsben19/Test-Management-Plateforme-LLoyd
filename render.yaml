# Render Blueprint — InsureTM (déploiement complet)
# Dashboard Render → New → Blueprint → connecter ce repo

databases:
  - name: insuretm-db
    databaseName: insureTM_db
    user: insuretm
    plan: starter
    region: frankfurt

services:
  # Application principale : React + Django + Playwright + noVNC
  - type: web
    name: insuretm
    runtime: docker
    dockerfilePath: ./render/Dockerfile
    dockerContext: .
    plan: standard
    region: frankfurt
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: insuretm-data
      mountPath: /app/media
      sizeGB: 5
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insuretm-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: "True"
      # À renseigner manuellement dans le dashboard après création :
      # EMAIL_USER, EMAIL_PASSWORD, GROQ_API_KEY, GEMINI_API_KEY
      # APP_URL, FRONTEND_URL, BACKEND_URL → URL du service insuretm
      # N8N_BASE_URL → URL du service insuretm-n8n

  # n8n — orchestration renforts testeurs
  - type: web
    name: insuretm-n8n
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest
    plan: starter
    region: frankfurt
    autoDeploy: false
    envVars:
      - key: GENERIC_TIMEZONE
        value: Africa/Tunis
      - key: TZ
        value: Africa/Tunis
      - key: N8N_HOST
        sync: false
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        sync: false
