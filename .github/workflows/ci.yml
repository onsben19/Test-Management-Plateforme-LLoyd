name: CI — InsureTM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:

  # ----------------------------
  # Detect changes
  # ----------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'InsureTM/**'
            frontend:
              - 'project/**'

  # ----------------------------
  # Backend Tests
  # ----------------------------
  backend-test:
    name: Backend — Django Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: insureTM_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: "True"
      SECRET_KEY: "ci-secret-key-not-for-production"
      DATABASE_URL: "postgres://postgres:ci_password@localhost:5432/insureTM_db"
      ALLOWED_HOSTS: "localhost"
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""
      VANNA_API_KEY: ""
      VANNA_MODEL: "test"
      GROQ_API_KEY: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: InsureTM/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r InsureTM/requirements.txt

      - name: Django system check
        working-directory: InsureTM
        run: python manage.py check

      - name: Run migrations
        working-directory: InsureTM
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: InsureTM
        run: python manage.py test --verbosity=2

  # ----------------------------
  # Frontend
  # ----------------------------
  frontend-test:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: project/package-lock.json

      - name: Install dependencies
        working-directory: project
        run: npm ci

      - name: Run ESLint
        working-directory: project
        run: npm run lint

      - name: Build production bundle
        working-directory: project
        run: npm run build

  # ----------------------------
  # Docker Build + Push
  # ----------------------------
  docker-build:
    name: Docker — Build & Push Images
    runs-on: ubuntu-latest
    needs: [changes, backend-test, frontend-test]
    # Run whenever something changed and no upstream test failed.
    # (!cancelled() forces evaluation even if a test job was skipped.)
    if: >-
      !cancelled() && !failure() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')

    outputs:
      image_repo: ${{ steps.meta.outputs.repo }}
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::6}
          echo "IMAGE_REPO=$REPO" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      # ----------------------------
      # Backend Image
      # ----------------------------
      - name: Build & Push backend image
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./InsureTM
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/backend:latest
            ghcr.io/${{ env.IMAGE_REPO }}/backend:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------
      # Frontend Image
      # ----------------------------
      - name: Build & Push frontend image
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./project
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.insuretb.tech/api
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/frontend:latest
            ghcr.io/${{ env.IMAGE_REPO }}/frontend:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  # ----------------------------
  # Continuous Deployment — SSH to Azure VM & redeploy
  # ----------------------------
  deploy:
    name: Deploy — Azure VM (SSH)
    runs-on: ubuntu-latest
    needs: [changes, docker-build]
    # Only deploy on a real push to main, after images are published.
    if: >-
      !cancelled() && !failure() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_REPO: ${{ needs.docker-build.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.docker-build.outputs.short_sha }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          # Forward the values the remote script needs.
          envs: IMAGE_REPO,IMAGE_TAG,BACKEND_CHANGED,FRONTEND_CHANGED,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail

            # App directory on the VM (override via VM_APP_DIR secret; default below).
            APP_DIR="${{ secrets.VM_APP_DIR }}"
            : "${APP_DIR:=/opt/insuretm}"
            cd "$APP_DIR"

            echo "Deploy ${IMAGE_REPO} @ ${IMAGE_TAG} (backend=${BACKEND_CHANGED} frontend=${FRONTEND_CHANGED}) -> ${APP_DIR}"

            # Refresh compose file / project assets referenced as bind mounts.
            # (git reset --hard only touches tracked files, so the untracked
            #  .env below is preserved across deploys.)
            git fetch --prune origin main
            git reset --hard origin/main

            # Authenticate to GHCR so private images can be pulled.
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            # docker compose auto-loads this .env for ${VAR} interpolation.
            # It's the persistent source of truth for each service's pinned tag,
            # so every service always runs a real commit hash (never :latest).
            # We rewrite ONLY the line of the service that changed this commit;
            # the other service keeps its previously-deployed hash.
            ENV_FILE=".env"
            touch "$ENV_FILE"
            upsert() {
              key="$1"; val="$2"
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }

            upsert IMAGE_REPO "${IMAGE_REPO}"

            SERVICES=""
            if [ "${BACKEND_CHANGED}" = "true" ]; then
              upsert BACKEND_TAG "${IMAGE_TAG}"
              SERVICES="${SERVICES} backend"
            fi
            if [ "${FRONTEND_CHANGED}" = "true" ]; then
              upsert FRONTEND_TAG "${IMAGE_TAG}"
              SERVICES="${SERVICES} frontend"
            fi

            if [ -z "${SERVICES}" ]; then
              echo "No frontend/backend change to deploy."
              docker logout ghcr.io
              exit 0
            fi

            echo "Pinned tags (.env):"; cat "$ENV_FILE"
            echo "Updating:${SERVICES}"

            # Do NOT export BACKEND_TAG/FRONTEND_TAG here — a shell env var would
            # override .env and break per-service persistence. Let compose read .env.
            docker compose -f docker-compose.yml pull ${SERVICES}
            docker compose -f docker-compose.yml up -d ${SERVICES}

            # Housekeeping.
            docker image prune -f
            docker logout ghcr.io
