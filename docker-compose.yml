services:

  # ─────────────────────────────────────────────────────────
  # Database — PostgreSQL 15
  # ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: insuretm-db
    restart: unless-stopped
    env_file:
      - ./InsureTM/.env.docker
    environment:
      POSTGRES_DB: insureTM_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 282681
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insureTM_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Backend — Django + Gunicorn
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./InsureTM
      dockerfile: Dockerfile
    container_name: insuretm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "5900:5900"
      - "6080:6080"
    env_file:
      - ./InsureTM/.env.docker
    volumes:
      - ./InsureTM:/app
      - ./project/tests/generated:/project/tests/generated
      - ./project/playwright.config.ts:/project/playwright.config.ts
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # ─────────────────────────────────────────────────────────
  # Frontend — React / Vite → Nginx
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      dockerfile: Dockerfile
      environment:
        VITE_API_BASE_URL: https://api.insuretb.tech/api
        FRONTEND_URL: https://insuretb.tech
    container_name: insuretm-frontend
    restart: unless-stopped
    expose:
      - "4173"

  # ─────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy (unique entry point)
  # ─────────────────────────────────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: insuretm-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - media_data:/app/media:ro
  #     - static_data:/app/staticfiles:ro
  #   depends_on:
  #     - backend
  #     - frontend

  # ─────────────────────────────────────────────────────────
  # n8n — Workflow Automation
  # ─────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: insuretm-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=Africa/Tunis
      - TZ=Africa/Tunis

volumes:
  postgres_data:
  media_data:
  static_data:
  n8n_data:
