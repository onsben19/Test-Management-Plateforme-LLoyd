services:

  # ─────────────────────────────────────────────────────────
  # Database — PostgreSQL 15
  # ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: insuretm-db
    restart: unless-stopped
    env_file:
      - ./InsureTM/.env.docker
    environment:
      POSTGRES_DB: insureTM_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 282681
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insureTM_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Backend — Django + Gunicorn
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./InsureTM
      dockerfile: Dockerfile
    container_name: insuretm-backend
    restart: unless-stopped
    env_file:
      - ./InsureTM/.env.docker
    volumes:
      - ./InsureTM:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # ─────────────────────────────────────────────────────────
  # Frontend — React / Vite → Nginx
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./project
      dockerfile: Dockerfile
    container_name: insuretm-frontend
    restart: unless-stopped
    expose:
      - "80"

  # ─────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy (unique entry point)
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: insuretm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_data:
  static_data:
