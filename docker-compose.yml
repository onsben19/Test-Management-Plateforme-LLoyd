# ─────────────────────────────────────────────────────────
# Production compose — runs pre-built images pulled from GHCR.
#
# Consumed by the CD pipeline on the Azure VM. Values below are read from
# a persistent .env file (auto-loaded by docker compose) that the deploy
# maintains — each service is pinned to its own last-deployed commit hash:
#   IMAGE_REPO=<owner>/<repo>     (lowercase)
#   BACKEND_TAG=<6-char sha>      (rewritten only when backend changes)
#   FRONTEND_TAG=<6-char sha>     (rewritten only when frontend changes)
# The ":-latest" fallbacks apply only before a service's first CD deploy.
# ─────────────────────────────────────────────────────────
services:

  db:
    image: postgres:15-alpine
    container_name: insuretm-db
    restart: unless-stopped
    env_file:
      - ./InsureTM/.env.docker
    environment:
      POSTGRES_DB: insureTM_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 282681
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insureTM_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${IMAGE_REPO}/backend:${BACKEND_TAG:-latest}
    container_name: insuretm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "5900:5900"
      - "6080:6080"
    env_file:
      - ./InsureTM/.env.docker
    volumes:
      - ./project/tests/generated:/project/tests/generated
      - ./project/playwright.config.ts:/project/playwright.config.ts
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/${IMAGE_REPO}/frontend:${FRONTEND_TAG:-latest}
    container_name: insuretm-frontend
    restart: unless-stopped
    ports:
      - "4173:4173"

  n8n:
    image: n8nio/n8n:latest
    container_name: insuretm-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=Africa/Tunis
      - TZ=Africa/Tunis
      - N8N_HOST=n8n.insuretb.tech
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.insuretb.tech/
      - N8N_PROXY_HOPS=1
      - N8N_SECURE_COOKIE=true

volumes:
  postgres_data:
  media_data:
  static_data:
  n8n_data:
